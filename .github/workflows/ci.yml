name: CI

# Validates every PR and every push to main: typecheck + production build.
# This is intentionally hermetic — it uses NO secrets and a read-only token, so
# it is safe to run on pull requests from forks (external contributors).
# Deploys are handled separately by Vercel's native Git integration, not here.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only ever reads the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install (locked)
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
