name: Bug report
description: Something in the site or an instrument is wrong or broken.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include the page/URL and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
  - type: input
    id: env
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 141 on macOS
